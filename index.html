<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rock-Paper-Scissors</title>
        <script type="module" src="script.js"></script>
    </head>
    <body>
        <h1>Rock-Paper-Scissors</h1>
        <p>
            Human Score: <span id="humanScore">0</span> | Computer Score:
            <span id="computerScore">0</span>
        </p>
        <p>What will you choose?</p>
        <div id="choiceBtns">
            <button data-value="1">Rock</button>
            <button data-value="2">Paper</button>
            <button data-value="3">Scissors</button>
        </div>
        <div id="result"></div>
    </body>
</html>
